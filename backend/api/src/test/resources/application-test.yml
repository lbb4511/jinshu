spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5433/jinshu
    username: jinshu
    password: jinshu123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 5000
      connection-init-sql: SET search_path TO sys,meta,data,workflow,audit,task

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    default-schema: public
    schemas: sys,meta,data,workflow,audit,task
    create-schemas: true
    clean-disabled: false

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.jinshu.common.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 0

jinshu:
  tenant:
    enabled: true
    interceptor:
      enabled: false
  audit:
    enabled: false
  file:
    base-path: /tmp/jinshu-test
