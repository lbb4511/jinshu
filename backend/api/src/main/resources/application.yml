# ============================================================
# 锦书企业级报表系统 - 应用配置文件
# ============================================================

spring:
  application:
    name: jinshu-report

  # PostgreSQL数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jinshu}
    username: ${DB_USER:jinshu}
    password: ${DB_PASSWORD:jinshu123}
    hikari:
      maximum-pool-size: 20  # 最大连接数
      minimum-idle: 5         # 最小空闲连接
      connection-timeout: 30000 # 连接超时（毫秒）

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  # RabbitMQ消息队列配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 500MB    # 最大单文件大小
      max-request-size: 500MB  # 最大请求大小

  # Spring Batch配置
  batch:
    jdbc:
      initialize-schema: always

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.jinshu.common.entity
  configuration:
    map-underscore-to-camel-case: true  # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Web服务配置
server:
  port: 8080
  servlet:
    context-path: /api

# 锦书系统自定义配置
jinshu:
  tenant:
    enabled: true              # 启用多租户
  audit:
    enabled: true              # 启用审计日志
  file:
    base-path: /data/jinshu    # 文件存储根路径
    max-size: 524288000     # 最大文件大小 500MB
  task:
    fair-scheduler: true        # 启用公平调度
    max-shard-rows: 100000    # 大任务分片行数

# 日志配置
logging:
  level:
    com.jinshu: DEBUG
    org.springframework.security: INFO
