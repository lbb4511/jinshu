# ============================================================
# 锦书企业级报表系统 - 应用配置文件
# ============================================================

spring:
  application:
    name: jinshu-report

  # PostgreSQL数据源配置
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jinshu}
    username: ${DB_USER:jinshu}
    password: ${DB_PASSWORD:jinshu123}
    hikari:
      maximum-pool-size: 20  # 最大连接数
      minimum-idle: 5         # 最小空闲连接
      connection-timeout: 30000 # 连接超时（毫秒）
      connection-init-sql: SET search_path TO sys,meta,data,workflow,audit,task,public

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  # RabbitMQ消息队列配置
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 500MB    # 最大单文件大小
      max-request-size: 500MB  # 最大请求大小

  # Spring Batch配置
  batch:
    jdbc:
      initialize-schema: always

  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    default-schema: public
    schemas: sys,meta,data,workflow,audit,task
    create-schemas: true

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.jinshu.common.entity
  configuration:
    map-underscore-to-camel-case: true  # 下划线转驼峰
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Web服务配置
server:
  port: 8080
  servlet:
    context-path: /api/v1

# 锦书系统自定义配置
jinshu:
  jwt:
    secret: ${JINSHU_JWT_SECRET:defaultSecretKeyForDevelopmentOnlyChangeInProduction12345}
    access-expiration: 1800000
    refresh-expiration: 604800000
  encryption:
    # 字段级 AES-256-GCM 加密密钥配置。
    # 生产环境必须通过 K8s Secret / 环境变量注入，严禁使用默认值。
    keys:
      1: ${JINSHU_ENCRYPTION_KEY_V1:Wi3DdD12Qg1KkvPcS530swxnrzSWCnQN0x3OPCJk8zU=}
    latest-version: ${JINSHU_ENCRYPTION_LATEST_VERSION:1}
  tenant:
    enabled: true              # 启用多租户
  audit:
    enabled: true              # 启用审计日志
  file:
    base-path: /data/jinshu    # 文件存储根路径
    max-size: 524288000     # 最大文件大小 500MB
  domain:
    frontend-url: ${FRONTEND_URL:http://localhost:3000}
    api-base-url: ${API_BASE_URL:http://localhost:8080}
    report-url: ${REPORT_URL:http://localhost:3000/report}
    cookie-domain: ${JINSHU_DOMAIN:localhost}
  task:
    fair-scheduler: true        # 启用公平调度
    max-shard-rows: 100000    # 大任务分片行数
  export:
    queue: jinshu.export        # 导出任务队列
  import:
    queue: ${JINSHU_IMPORT_QUEUE:jinshu.import.task}  # 导入任务队列
  ratelimit:
    enabled: true               # 启用 API 限流与租户并发配额拦截器

# Actuator / Prometheus 可观测性配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

# 日志配置
logging:
  level:
    com.jinshu: DEBUG
    org.springframework.security: INFO
