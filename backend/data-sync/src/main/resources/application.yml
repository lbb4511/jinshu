spring:
  application:
    name: jinshu-report

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/jinshu
    username: jinshu
    password: ${DB_PASSWORD:jinshu123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      connection-init-sql: SET search_path TO sys,meta,data,workflow,audit,task

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      database: 0

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  batch:
    jdbc:
      initialize-schema: always

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.jinshu.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

server:
  port: 8080
  servlet:
    context-path: /api

# 锦书系统配置
jinshu:
  tenant:
    enabled: true
  audit:
    enabled: true
  file:
    base-path: /data/jinshu
    max-size: 524288000
  task:
    fair-scheduler: true
    max-shard-rows: 100000

logging:
  level:
    com.jinshu: DEBUG
    org.springframework.security: INFO
