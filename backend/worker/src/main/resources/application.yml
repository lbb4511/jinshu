spring:
  application:
    name: jinshu-report

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jinshu}
    username: ${DB_USER:jinshu}
    password: ${DB_PASSWORD:jinshu123}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      connection-init-sql: SET search_path TO sys,meta,data,workflow,audit,task

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false

  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

  batch:
    jdbc:
      initialize-schema: always

  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    default-schema: public
    schemas: sys,meta,data,workflow,audit,task
    create-schemas: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.jinshu.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

server:
  port: 8080
  servlet:
    context-path: /api

# 锦书系统配置
jinshu:
  encryption:
    keys:
      1: ${JINSHU_ENCRYPTION_KEY_V1:Wi3DdD12Qg1KkvPcS530swxnrzSWCnQN0x3OPCJk8zU=}
    latest-version: ${JINSHU_ENCRYPTION_LATEST_VERSION:1}
  tenant:
    enabled: true
  audit:
    enabled: true
  file:
    base-path: /data/jinshu
    max-size: 524288000
  task:
    fair-scheduler: true
    max-shard-rows: 100000
  render:
    queue: jinshu.render
    segment:
      queue: jinshu.render.segment
  domain:
    frontend-url: ${FRONTEND_URL:http://localhost:3000}
    report-url: ${REPORT_URL:http://localhost:3000/report}

logging:
  level:
    com.jinshu: DEBUG
    org.springframework.security: INFO
