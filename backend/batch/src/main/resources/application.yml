spring:
  application:
    name: jinshu-batch

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jinshu}
    username: ${DB_USER:jinshu}
    password: ${DB_PASSWORD:jinshu123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-init-sql: SET search_path TO sys,meta,data,workflow,audit,task

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false

  batch:
    jdbc:
      initialize-schema: always

  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    default-schema: public
    schemas: sys,meta,data,workflow,audit,task
    create-schemas: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.jinshu.common.entity
  configuration:
    map-underscore-to-camel-case: true

jinshu:
  encryption:
    keys:
      1: ${JINSHU_ENCRYPTION_KEY_V1:Wi3DdD12Qg1KkvPcS530swxnrzSWCnQN0x3OPCJk8zU=}
    latest-version: ${JINSHU_ENCRYPTION_LATEST_VERSION:1}
  import:
    queue: ${JINSHU_IMPORT_QUEUE:jinshu.import.task}
    batch-size: 1000
    max-error-rate: 0.3
    shard:
      small-threshold: 10000
      medium-threshold: 100000
      small-shard-size: 10000
      medium-shard-size: 50000
      large-shard-size: 50000

# Actuator / Prometheus 可观测性配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.jinshu: DEBUG
