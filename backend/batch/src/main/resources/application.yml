spring:
  application:
    name: jinshu-batch

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jinshu}
    username: ${DB_USER:jinshu}
    password: ${DB_PASSWORD:jinshu123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-init-sql: SET search_path TO sys,meta,data,workflow,audit,task

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  batch:
    jdbc:
      initialize-schema: always

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.jinshu.common.entity
  configuration:
    map-underscore-to-camel-case: true

jinshu:
  import:
    queue: ${JINSHU_IMPORT_QUEUE:jinshu.import.task}
    batch-size: 1000
    max-error-rate: 0.3
    shard:
      small-threshold: 10000
      medium-threshold: 100000
      small-shard-size: 10000
      medium-shard-size: 50000
      large-shard-size: 50000

logging:
  level:
    com.jinshu: DEBUG
