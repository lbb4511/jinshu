name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: 10.43.170.83:3000
  BACKEND_IMAGE: 10.43.170.83:3000/admin/jinshu-backend
  FRONTEND_IMAGE: 10.43.170.83:3000/admin/jinshu-frontend

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jinshu_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Frontend install & build
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build
        working-directory: frontend

      - name: Backend compile
        run: |
          docker run --rm \
            --network host \
            -v $PWD/backend:/app -w /app \
            gradle:8-jdk21 \
            gradle compileJava --no-daemon

      - name: Backend test
        run: |
          docker run --rm \
            --network host \
            -v $PWD/backend:/app -w /app \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_NAME=jinshu_test \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            gradle:8-jdk21 \
            gradle test --no-daemon

      - name: Check dependency licenses
        run: |
          docker run --rm \
            -v $PWD/backend:/app -w /app \
            gradle:8-jdk21 \
            gradle checkLicense --no-daemon || true

      - name: Login to Gitea registry
        run: docker login -u admin -p admin123 $REGISTRY

      - name: Build & push backend image
        run: |
          docker build -t $BACKEND_IMAGE:${{ github.sha }} backend/
          docker tag $BACKEND_IMAGE:${{ github.sha }} $BACKEND_IMAGE:latest
          docker push $BACKEND_IMAGE:${{ github.sha }}
          docker push $BACKEND_IMAGE:latest

      - name: Build & push frontend image
        run: |
          docker build -t $FRONTEND_IMAGE:${{ github.sha }} frontend/
          docker tag $FRONTEND_IMAGE:${{ github.sha }} $FRONTEND_IMAGE:latest
          docker push $FRONTEND_IMAGE:${{ github.sha }}
          docker push $FRONTEND_IMAGE:latest

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/v1.35.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          install kubectl /usr/local/bin/

      - name: Deploy to K3s
        run: |
          kubectl apply -k k8s/
          kubectl set image deployment/jinshu-backend -n jinshu \
            "backend=$BACKEND_IMAGE:${{ github.sha }}"
          kubectl set image deployment/jinshu-frontend -n jinshu \
            "frontend=$FRONTEND_IMAGE:${{ github.sha }}"
          kubectl rollout status deployment/jinshu-backend -n jinshu --timeout=120s
          kubectl rollout status deployment/jinshu-frontend -n jinshu --timeout=60s
