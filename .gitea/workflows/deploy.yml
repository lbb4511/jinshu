# CI/CD Pipeline for Gitea Actions
# 完全基于 Gitea 内部服务，不依赖 GitHub

name: CI/CD Pipeline

on:
  push:
  pull_request:
    branches: [main]

env:
  SSH_HOST: 192.168.3.11
  SSH_USER: dev
  REGISTRY: 10.43.170.83:3000
  GITEA_URL: http://gitea-http.gitea.svc.cluster.local:3000

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          TOKEN: ${{ gitea.token }}
        run: |
          git clone http://git:${TOKEN}@gitea-http.gitea.svc.cluster.local:3000/admin/jinshu.git .
          git checkout ${{ gitea.sha }}

      - name: Setup SSH & run CI
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
          SHA="${{ gitea.sha }}"
          tar czf - . | ssh -i ~/.ssh/id_ed25519 ${SSH_USER}@${SSH_HOST} \
            "rm -rf /tmp/jinshu-ci-$SHA && mkdir -p /tmp/jinshu-ci-$SHA && \
             tar xzf - -C /tmp/jinshu-ci-$SHA && \
             bash /tmp/jinshu-ci-$SHA/scripts/ci.sh $SHA"

  deploy:
    needs: ci
    if: gitea.ref == 'refs/heads/main' && gitea.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          TOKEN: ${{ gitea.token }}
        run: |
          git clone http://git:${TOKEN}@gitea-http.gitea.svc.cluster.local:3000/admin/jinshu.git .
          git checkout ${{ gitea.sha }}

      - name: Setup SSH & deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
          tar czf - . | ssh -i ~/.ssh/id_ed25519 ${SSH_USER}@${SSH_HOST} \
            "rm -rf /tmp/jinshu && mkdir -p /tmp/jinshu && \
             tar xzf - -C /tmp/jinshu && \
             bash ~/scripts/deploy-jinshu.sh ${{ gitea.sha }}"
