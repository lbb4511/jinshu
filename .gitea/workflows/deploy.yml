name: Deploy
on: [push]

env:
  SSH_HOST: 192.168.3.11
  SSH_USER: dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          rm -rf /workspace/src
          mkdir -p /workspace/src
          git clone http://gitea-http.gitea.svc.cluster.local:3000/admin/jinshu.git /workspace/src
          cd /workspace/src && git checkout ${{ gitea.sha }}

      - name: Setup SSH
        run: |
          apt-get update -qq && apt-get install -y -qq openssh-client
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: |
          tar czf - -C /workspace/src . | \
            ssh -i ~/.ssh/id_ed25519 ${SSH_USER}@${SSH_HOST} \
              "rm -rf /tmp/jinshu && mkdir -p /tmp/jinshu && tar xzf - -C /tmp/jinshu && \
               bash ~/scripts/deploy-jinshu.sh ${{ gitea.sha }}"
