# CI/CD Pipeline for Gitea Actions
# - CI: 代码推送时编译检查
# - CD: 打 tag 时构建 Docker 镜像并部署到 K3s

name: CI/CD Pipeline

on:
  push:
  pull_request:
    branches: [main]

env:
  SSH_HOST: 192.168.3.11
  SSH_USER: dev
  GITEA_URL: http://gitea-http.gitea.svc.cluster.local:3000
  REGISTRY: gitea-http.gitea.svc.cluster.local:3000

jobs:
  ci:
    if: github.event_name != 'pull_request' || (github.event_name == 'pull_request' && github.base_ref == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          TOKEN: ${{ gitea.token }}
        run: |
          git clone http://git:${TOKEN}@gitea-http.gitea.svc.cluster.local:3000/admin/jinshu.git .
          git checkout ${{ gitea.sha }}

      - name: Setup SSH & run CI
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
          SHA="${{ gitea.sha }}"
          tar czf - . | ssh -i ~/.ssh/id_ed25519 ${SSH_USER}@${SSH_HOST} \
            "rm -rf /tmp/jinshu-ci-$SHA && mkdir -p /tmp/jinshu-ci-$SHA && \
             tar xzf - -C /tmp/jinshu-ci-$SHA && \
             bash /tmp/jinshu-ci-$SHA/scripts/ci.sh $SHA"

  cd:
    if: startsWith(gitea.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          TOKEN: ${{ gitea.token }}
        run: |
          git clone http://git:${TOKEN}@gitea-http.gitea.svc.cluster.local:3000/admin/jinshu.git .
          git checkout ${{ gitea.sha }}

      - name: Setup SSH & deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
          SHA="${{ gitea.sha }}"
          TAG="${{ gitea.ref }}"
          tar czf - . | ssh -i ~/.ssh/id_ed25519 ${SSH_USER}@${SSH_HOST} \
            "rm -rf /tmp/jinshu && mkdir -p /tmp/jinshu && \
             tar xzf - -C /tmp/jinshu && \
             GITEA_TOKEN=${{ secrets.REGISTRY_TOKEN }} \
               bash /tmp/jinshu/scripts/deploy-jinshu.sh $SHA $TAG"
