name: Build & Deploy
on: [push]

env:
  REGISTRY: 10.43.170.83:3000
  BACKEND_IMAGE: 10.43.170.83:3000/admin/jinshu-backend
  FRONTEND_IMAGE: 10.43.170.83:3000/admin/jinshu-frontend
  DOCKER_HOST: tcp://localhost:2375

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          curl -fsSL https://dockermirror.com/docker-27.5.1.tgz -o /tmp/docker.tgz || \
          curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-27.5.1.tgz -o /tmp/docker.tgz
          tar xzf /tmp/docker.tgz -C /usr/local/bin --strip-components=1 docker/docker
          chmod +x /usr/local/bin/docker
          curl -sSL --retry 3 https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl -o /usr/local/bin/kubectl
          chmod +x /usr/local/bin/kubectl

      - name: Checkout
        run: |
          mkdir -p /workspace
          cd /workspace
          git clone http://gitea-http.gitea.svc.cluster.local:3000/admin/jinshu.git .
          git checkout ${{ gitea.sha }}

      - name: Docker Login
        run: echo admin123 | docker login $REGISTRY -u admin --password-stdin

      - name: Build Backend
        run: docker build -t $BACKEND_IMAGE:${{ gitea.sha }} -t $BACKEND_IMAGE:latest /workspace/backend

      - name: Build Frontend
        run: docker build -t $FRONTEND_IMAGE:${{ gitea.sha }} -t $FRONTEND_IMAGE:latest /workspace/frontend

      - name: Push Images
        run: |
          docker push $BACKEND_IMAGE:${{ gitea.sha }}
          docker push $FRONTEND_IMAGE:${{ gitea.sha }}

      - name: Deploy
        run: |
          sed -i "s|image: .*jinshu-backend:.*|image: $BACKEND_IMAGE:${{ gitea.sha }}|" /workspace/k8s/deployment.yaml
          sed -i "s|image: .*jinshu-frontend:.*|image: $FRONTEND_IMAGE:${{ gitea.sha }}|" /workspace/k8s/deployment.yaml
          kubectl --kubeconfig <(echo "${{ secrets.KUBECONFIG }}") apply -f /workspace/k8s/

      - name: Verify
        run: |
          sleep 30
          kubectl --kubeconfig <(echo "${{ secrets.KUBECONFIG }}") rollout status deployment/jinshu-backend -n jinshu --timeout=120s
          kubectl --kubeconfig <(echo "${{ secrets.KUBECONFIG }}") rollout status deployment/jinshu-frontend -n jinshu --timeout=60s
