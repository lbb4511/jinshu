apiVersion: apps/v1
kind: Deployment
metadata:
  name: jinshu-backend
  namespace: jinshu
  labels:
    app: jinshu-backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: jinshu-backend
  template:
    metadata:
      labels:
        app: jinshu-backend
    spec:
      containers:
      - name: backend
        image: 10.43.170.83:3000/admin/jinshu-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: db_host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: db_port
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: db_name
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: db_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: jinshu-secret
              key: db_password
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: redis_host
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: redis_port
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: jinshu-secret
              key: redis_password
        - name: RABBITMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: rabbitmq_host
        - name: RABBITMQ_PORT
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: rabbitmq_port
        - name: RABBITMQ_USER
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: rabbitmq_user
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: jinshu-secret
              key: rabbitmq_password
        - name: JINSHU_FILE_BASE_PATH
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: jinshu_file_base_path
        - name: JINSHU_IMPORT_QUEUE
          value: "jinshu.import.task"
        livenessProbe:
          httpGet:
            path: /api/v1/live
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/v1/ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /data/jinshu
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: jinshu-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jinshu-frontend
  namespace: jinshu
  labels:
    app: jinshu-frontend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: jinshu-frontend
  template:
    metadata:
      labels:
        app: jinshu-frontend
    spec:
      containers:
      - name: frontend
        image: 10.43.170.83:3000/admin/jinshu-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
