apiVersion: apps/v1
kind: Deployment
metadata:
  name: jinshu-backend
  labels:
    app: jinshu-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jinshu-backend
  template:
    metadata:
      labels:
        app: jinshu-backend
    spec:
      containers:
      - name: backend
        image: jinshu-report-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: db_host
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: jinshu-secret
              key: db_password
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jinshu-frontend
  labels:
    app: jinshu-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jinshu-frontend
  template:
    metadata:
      labels:
        app: jinshu-frontend
    spec:
      containers:
      - name: frontend
        image: jinshu-report-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
