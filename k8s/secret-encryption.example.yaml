# =====================================================
# 加密密钥 Secret 示例
# =====================================================
# 本文件为示例，不要直接应用于生产环境！
# 使用前先生成 32 字节 Base64 密钥：
#   openssl rand -base64 32
# 然后替换下面的 <base64-32-byte-key>。
# 实际密钥 Secret 应由运维手动创建或外部密钥管理系统注入，
# 不在 Git 仓库中保存真实密钥。
#
# 创建命令（dev 环境示例）：
#   kubectl -n jinshu create secret generic jinshu-encryption-keys \
#     --from-literal=key-v1="$(openssl rand -base64 32)"
# =====================================================
apiVersion: v1
kind: Secret
metadata:
  name: jinshu-encryption-keys
  namespace: jinshu
type: Opaque
stringData:
  key-v1: "<base64-32-byte-key>"
