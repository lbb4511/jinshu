apiVersion: apps/v1
kind: Deployment
metadata:
  name: jinshu-renderer
  namespace: jinshu
  labels:
    app: jinshu-renderer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jinshu-renderer
  template:
    metadata:
      labels:
        app: jinshu-renderer
    spec:
      containers:
      - name: renderer
        image: 10.43.170.83:3000/admin/jinshu-renderer:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: RABBITMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: rabbitmq_host
        - name: RABBITMQ_PORT
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: rabbitmq_port
        - name: RABBITMQ_USER
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: rabbitmq_user
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: jinshu-secret
              key: rabbitmq_password
        - name: RABBITMQ_URL
          value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASSWORD)@$(RABBITMQ_HOST):$(RABBITMQ_PORT)"
        - name: JINSHU_FILE_BASE_PATH
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: jinshu_file_base_path
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: db_host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: db_port
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: db_name
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: jinshu-config
              key: db_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: jinshu-secret
              key: db_password
        volumeMounts:
        - name: data
          mountPath: /data/jinshu
        - name: temp
          mountPath: /data/temp
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: jinshu-data
      - name: temp
        emptyDir: {}
