# ============================================================
# 锦书企业级报表系统 - Docker Compose配置
# 用于快速启动开发环境基础设施
# ============================================================

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-jinshu}          # 数据库名
      POSTGRES_USER: ${DB_USER:-jinshu}        # 用户名
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jinshu123}  # 密码
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  # 数据持久化
      - ./sql/ddl:/docker-entrypoint-initdb.d   # 自动初始化表
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jinshu} -d ${DB_NAME:-jinshu}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis 缓存
  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"        # AMQP协议端口
      - "15672:15672"                          # Web管理界面端口
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:  # PostgreSQL数据卷
